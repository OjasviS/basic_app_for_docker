apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: basic-app
  namespace: argocd
spec:
  project: basic-app-project

  source:
    repoURL: https://github.com/OjasviS/basic_app_for_docker.git  # TODO: replace with your actual Git repo URL
    path: k8s/app
    targetRevision: main

  destination:
    server: https://kubernetes.default.svc
    namespace: argo-deployed-resources

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
