apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: basic-app-project
  namespace: argocd
spec:
  description: "Project boundary for basic-app; minikube cluster, argo_deployed_resources namespace only."
  # Allowed destinations: cluster + namespace
  destinations:
    - server: https://kubernetes.default.svc
      namespace: argo-deployed-resources
  # Optional: restrict which Git repos can be used (uncomment and set if needed)
  sourceRepos:
    - '*'
  sourceNamespaces: []
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: apps
      kind: Deployment
    - group: ""
      kind: Service
    - group: networking.k8s.io
      kind: Ingress