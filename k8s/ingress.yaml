# Optional: for external access. Enable minikube ingress first:
#   minikube addons enable ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: basic-app
spec:
  ingressClassName: nginx
  rules:
    - host: basic-app.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: basic-app
                port:
                  number: 80
